# VM2: Caller Worker (TypeScript)
# Deployed to PRIVATE subnet EC2 instance
#
# Requires: ENGINE_IP env var set to VM1's private IP
# Usage: ENGINE_IP=10.0.1.x docker compose -f docker-compose.vm2.yml up -d

services:
  caller-worker:
    image: ${DOCKERHUB_USER:-faizanfirdousi}/iii-caller-worker:latest
    container_name: iii-caller
    environment:
      - III_URL=ws://${ENGINE_IP:?Set ENGINE_IP to VM1 private IP}:49134
    restart: unless-stopped
